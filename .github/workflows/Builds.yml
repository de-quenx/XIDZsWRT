name: Build Custom Firmware Devices

on:
  workflow_dispatch:
    inputs:
      release_branch:
        description: "Select the release branch"
        required: true
        default: "openwrt:24.10.7"
        type: choice
        options:
          - openwrt:25.12.5
          - openwrt:24.10.7
          - openwrt:23.05.6
          - immortalwrt:25.12.1
          - immortalwrt:24.10.6
          - immortalwrt:23.05.7
      rootfs_size:
        description: "Rootfs Size (MB)"
        required: true
        default: "1024"
        type: choice
        options:
          - "512"
          - "768"
          - "1024"
          - "1280"
          - "2560"
          - "4096"
          - "8192"
      target:
        description: "Select device board"
        required: true
        default: "all-devices-official"
        type: choice
        options:
          - all-devices-official
          - opt-devices-official
          - all-devices-ulo
          - all-devices-ophub
          - opt-devices-ophub
          - rk-devices-ophub
          - Widora Mangopi M28C
          - Widora Mangopi M28K
          - Nanopi-r2c
          - Nanopi-r2c Plus
          - Nanopi-r2s
          - Nanopi-r3s
          - Nanopi-r4s
          - Nanopi-r5s
          - Orangepi Pc 2
          - Orangepi R1 Plus
          - Orangepi R1 Plus LTS
          - Raspberry Pi 1B
          - Raspberry Pi 2B
          - Raspberry Pi 3B
          - Raspberry Pi 4B
          - Raspberry Pi 5B
          - X86-64
          - X86-Generic
          - Allwinner H5 Orangepi Zero Plus
          - Allwinner H5 Orangepi Zero Plus2
          - Allwinner H6 Orangepi 3
          - Allwinner H6 Orangepi 3 LTS
          - Allwinner H616 Orangepi Zero2
          - Allwinner H618 Orangepi Zero3
          - Orangepi 3B
          - Amlogic B860Hv5 - 6.1.66
          - Amlogic B860Hv5 - 6.4.11
          - Amlogic B860Hv5 - 6.2.2
          - Amlogic HG680-FJ - 6.1.66
          - Amlogic HG680-FJ - 6.4.11
          - Amlogic HG680-FJ - 6.2.2
          - Amlogic s905x4 - 6.1.66
          - Amlogic s905x4 - 5.4.279
          - Amlogic s905x4 - 6.6.6
          - Amlogic s905x4 - 5.4.265
          - Amlogic s905 MXQ-Pro+
          - Amlogic s905 Beelink-Mini
          - Amlogic s905lb Q96-Mini
          - Amlogic s905w TX3-Mini
          - Amlogic s905w X96-Mini
          - Amlogic s905w X96W
          - Amlogic s905x B860H
          - Amlogic s905x B860H MODSDCARD
          - Amlogic s905x HG680P
          - Amlogic s905x HG680P MODSDCARD
          - Amlogic s905x2 B860Hv5
          - Amlogic s905x2 B860Hv5-x
          - Amlogic s905x2 HG680-FJ
          - Amlogic s905x2 HG680-FJ-x
          - Amlogic s905x2 X96Max-v2Gb
          - Amlogic s905x2 X96Max-v4Gb
          - Amlogic s905x3 HK1-Vontar-X3
          - Amlogic s905x3 X96Air_100mb
          - Amlogic s905x3 X96Air_1Gb
          - Amlogic s905x3 X96Max+_100Mb
          - Amlogic s905x3 X96Max+_1Gb
          - Amlogic s905x3 H96-Max-X3
          - Amlogic s905x4 Advan-At01_Ax810
          - Amlogic s912 Nexbox-A1-A95X
          - Amlogic s912 Nexbox-A95X-A2
          - Amlogic s922x GT-King-Pro
          - Tanix-TX6
          - Rk3318-BOX
          - Firefly-Rk3328
          - Rk3399 King3399
          - Orangepi 5 Plus
          - Orangepi 5B
          - H96-Max-M2
          - Nanopi-M5
      tunnel:
        description: "Select Tunnel VPN"
        required: true
        default: "openclash"
        type: choice
        options:
          - no-tunnel
          - openclash
          - openclash-nikki
          - openclash-fusiontunx
          - openclash-nikki-passwall
      clean:
        description: "Do make clean for each run"
        required: false
        default: "true"
        type: boolean

env:
  TZ: Asia/Jakarta
  WORKING_DIR: imagebuilder
  DEBIAN_FRONTEND: noninteractive
  RELEASE_BRANCH: ${{ inputs.release_branch }}
  ROOTFS_SIZE: ${{ inputs.rootfs_size }}
  TARGET: ${{ inputs.target }}
  TUNNEL: ${{ inputs.tunnel }}
  CLEAN: ${{ inputs.clean }}

jobs:
  prebuild:
    runs-on: ubuntu-latest
    name: Setup ${{ inputs.release_branch }}
    outputs:
      target: ${{ steps.set-matrix.outputs.target }}
      base: ${{ steps.setupenv.outputs.base }}
      branch: ${{ steps.setupenv.outputs.branch }}
      verop: ${{ steps.setupenv.outputs.verop }}
      download_base: ${{ steps.setupenv.outputs.download_base }}
      date: ${{ steps.setupenv.outputs.date }}
      datetime: ${{ steps.setupenv.outputs.datetime }}
      release_name: ${{ steps.setupenv.outputs.release_name }}
      release_tag: ${{ steps.setupenv.outputs.release_tag }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Set Matrix Target JSON
        id: set-matrix
        run: |
          ALL_OFFICIAL_JSON=$(cat << 'EOJ'
          { "target": ["Nanopi-r2c", "Nanopi-r2c Plus", "Nanopi-r2s", "Nanopi-r3s", "Nanopi-r4s", "Nanopi-r5s", "Orangepi Pc 2", "Orangepi R1 Plus", "Orangepi R1 Plus LTS", "Raspberry Pi 2B", "Raspberry Pi 3B", "Raspberry Pi 4B", "X86-64"] }
          EOJ
          )
          
          OPT_OFFICIAL_JSON=$(cat << 'EOJ'
          { "target": ["Raspberry Pi 1B", "Raspberry Pi 5B", "X86-Generic"] }
          EOJ
          )

          ALL_ULO_JSON=$(cat << 'EOJ'
          { "target": ["Allwinner H5 Orangepi Zero Plus", "Allwinner H5 Orangepi Zero Plus2", "Allwinner H6 Orangepi 3", "Allwinner H6 Orangepi 3 LTS", "Allwinner H616 Orangepi Zero2", "Allwinner H618 Orangepi Zero3", "Orangepi 3B", "Amlogic B860Hv5 - 6.1.66", "Amlogic B860Hv5 - 6.4.11", "Amlogic B860Hv5 - 6.2.2", "Amlogic HG680-FJ - 6.1.66", "Amlogic HG680-FJ - 6.4.11", "Amlogic HG680-FJ - 6.2.2", "Amlogic s905x4 - 6.1.66", "Amlogic s905x4 - 5.4.279", "Amlogic s905x4 - 6.6.6", "Amlogic s905x4 - 5.4.265"] }
          EOJ
          )

          ALL_OPHUB_JSON=$(cat << 'EOJ'
          { "target": ["Amlogic s905 MXQ-Pro+", "Amlogic s905 Beelink-Mini", "Amlogic s905lb Q96-Mini", "Amlogic s905w TX3-Mini", "Amlogic s905w X96-Mini", "Amlogic s905w X96W", "Amlogic s905x B860H", "Amlogic s905x B860H MODSDCARD", "Amlogic s905x HG680P", "Amlogic s905x HG680P MODSDCARD", "Amlogic s905x2 B860Hv5", "Amlogic s905x2 B860Hv5-x", "Amlogic s905x2 HG680-FJ", "Amlogic s905x2 HG680-FJ-x", "Amlogic s905x2 X96Max-v2Gb", "Amlogic s905x2 X96Max-v4Gb", "Amlogic s905x3 HK1-Vontar-X3", "Amlogic s905x3 X96Air_100mb", "Amlogic s905x3 X96Air_1Gb", "Amlogic s905x3 X96Max+_100Mb", "Amlogic s905x3 X96Max+_1Gb", "Amlogic s905x3 H96-Max-X3", "Amlogic s905x4 Advan-At01_Ax810", "Amlogic s912 Nexbox-A1-A95X", "Amlogic s912 Nexbox-A95X-A2", "Amlogic s922x GT-King-Pro", "Tanix-TX6", "Rk3318-BOX", "Rk3399 King3399"] }
          EOJ
          )

          OPT_OPHUB_JSON=$(cat << 'EOJ'
          { "target": ["Amlogic s905x B860H", "Amlogic s905x B860H MODSDCARD", "Amlogic s905x HG680P", "Amlogic s905x HG680P MODSDCARD"] }
          EOJ
          )

          RK_OPHUB_JSON=$(cat << 'EOJ'
          { "target": ["Orangepi 5 Plus", "Orangepi 5B", "H96-Max-M2", "Nanopi-M5", "Firefly-Rk3328"] }
          EOJ
          )

          if [ "${{ inputs.target }}" == "all-devices-official" ]; then
            echo "target=$(echo "$ALL_OFFICIAL_JSON" | jq -c '.target')" >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.target }}" == "opt-devices-official" ]; then
            echo "target=$(echo "$OPT_OFFICIAL_JSON" | jq -c '.target')" >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.target }}" == "all-devices-ulo" ]; then
            echo "target=$(echo "$ALL_ULO_JSON" | jq -c '.target')" >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.target }}" == "all-devices-ophub" ]; then
            echo "target=$(echo "$ALL_OPHUB_JSON" | jq -c '.target')" >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.target }}" == "opt-devices-ophub" ]; then
            echo "target=$(echo "$OPT_OPHUB_JSON" | jq -c '.target')" >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.target }}" == "rk-devices-ophub" ]; then
            echo "target=$(echo "$RK_OPHUB_JSON" | jq -c '.target')" >> "$GITHUB_OUTPUT"
          else
            echo "target=$(jq -nc --arg d "${{ inputs.target }}" '[$d]')" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Global Environment
        id: setupenv
        run: |
          sudo timedatectl set-timezone "${{ env.TZ }}"
          
          BASE="${RELEASE_BRANCH%:*}"
          BRANCH="${RELEASE_BRANCH#*:}"
          VEROP="$(echo "${BRANCH}" | awk -F. '{print $1"."$2}')"
          
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "verop=$VEROP" >> "$GITHUB_OUTPUT"
          echo "download_base=https://downloads.${BASE}.org" >> "$GITHUB_OUTPUT"
          
          DATE=$(date +'%d%m%Y')
          DATETIME=$(date +'%d.%m.%Y-%H:%M:%S')
          
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "datetime=$DATETIME" >> "$GITHUB_OUTPUT"
          
          LOWER_BASE=$(echo "$BASE" | tr 'A-Z' 'a-z')
          RELEASE_NAME="xidzswrt-${VEROP}-${LOWER_BASE}-${DATE}"
          RELEASE_TAG="xidzswrt-${VEROP}-${LOWER_BASE}-${DATE}"
          
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Create Release Node
        if: steps.setupenv.outputs.status == 'success'
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.setupenv.outputs.release_tag }}
          name: ${{ steps.setupenv.outputs.release_name }}
          prerelease: ${{ github.ref_name == 'dev' }}
          body: |

  build-firmware:
    name: Build ${{ matrix.target }}
    needs: prebuild
    runs-on: ubuntu-latest
    env:
      BASE: ${{ needs.prebuild.outputs.base }}
      BRANCH: ${{ needs.prebuild.outputs.branch }}
      VEROP: ${{ needs.prebuild.outputs.verop }}
      DOWNLOAD_BASE: ${{ needs.prebuild.outputs.download_base }}
      DATE: ${{ needs.prebuild.outputs.date }}
      DATETIME: ${{ needs.prebuild.outputs.datetime }}
      RELEASE_NAME: ${{ needs.prebuild.outputs.release_name }}
      RELEASE_TAG: ${{ needs.prebuild.outputs.release_tag }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        target: ${{ fromJSON(needs.prebuild.outputs.target) }}

    steps:
      - name: Init Virtual Machine
        id: init
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a && sudo rm -f /swapfile /mnt/swapfile
          
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install dos2unix zstd xz-utils $(curl -fsSL https://ophub.org/ubuntu2404-make-openwrt-depends)
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge && sudo -E apt-get clean
          
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo timedatectl set-timezone "${{ env.TZ }}"
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Expand Virtual Disk
        id: disk
        if: steps.init.outputs.status == 'success' && contains(inputs.target, 'all-devices')
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6 /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Checkout Source Code
        uses: actions/checkout@v6
        with:
          path: origin
          fetch-depth: 1

      - name: Route Target Variables
        id: variables
        run: |
          MATRIXTARGET="${{ matrix.target }}"
          echo "MATRIXTARGET=$MATRIXTARGET" >> $GITHUB_ENV

          case $BASE in
            openwrt) echo "OP_BASE=OpenWrt" >> $GITHUB_ENV ;;
            immortalwrt) echo "OP_BASE=ImmortalWrt" >> $GITHUB_ENV ;;
          esac

          BUILDER_TYPE="official"
          case "$MATRIXTARGET" in
             "Allwinner"* | "Orangepi 3B" | "Amlogic B860Hv5"* | "Amlogic HG680-FJ"* | "Amlogic s905x4"*)
                BUILDER_TYPE="ulo" ;;
             "Amlogic s905 "* | "Amlogic s905lb"* | "Amlogic s905w"* | "Amlogic s905x "* | "Amlogic s905x2 "* | "Amlogic s905x3 "* | "Amlogic s905x4 Advan"* | "Amlogic s912"* | "Amlogic s922x"* | "Tanix"* | "Rk3318"* | "Firefly"* | "Rk3399"* | "Orangepi 5"* | "H96-Max"* | "Nanopi-M5")
                BUILDER_TYPE="ophub" ;;
          esac

          if [ "$BUILDER_TYPE" == "official" ]; then
            case "$MATRIXTARGET" in
              "Nanopi-r2c" | "Nanopi-r2c Plus" | "Nanopi-r2s" | "Nanopi-r3s" | "Nanopi-r4s" | "Nanopi-r5s")
                TARGET_NAME="rockchip-armv8"; TARGET_SYSTEM="rockchip/armv8"
                ARCH_1="arm64"; ARCH_2="aarch64"; ARCH_3="aarch64_generic"
                ;;
              "Widora Mangopi M28C")
                TARGET_NAME="rockchip-armv8"; TARGET_SYSTEM="rockchip/armv8"
                ARCH_1="arm64"; ARCH_2="aarch64"; ARCH_3="aarch64_generic"
                ;;
              "Widora Mangopi M28K")
                TARGET_NAME="rockchip-armv8"; TARGET_SYSTEM="rockchip/armv8"
                ARCH_1="arm64"; ARCH_2="aarch64"; ARCH_3="aarch64_generic"
                ;;
              "Orangepi Pc 2")
                TARGET_NAME="sunxi-cortexa53"; TARGET_SYSTEM="sunxi/cortexa53"
                ARCH_1="arm64"; ARCH_2="aarch64"; ARCH_3="aarch64_cortex-a53"
                ;;
              "Orangepi R1 Plus" | "Orangepi R1 Plus LTS")
                TARGET_NAME="rockchip-armv8"; TARGET_SYSTEM="rockchip/armv8"
                ARCH_1="arm64"; ARCH_2="aarch64"; ARCH_3="aarch64_generic"
                ;;
              "Raspberry Pi 1B")
                TARGET_NAME="bcm27xx-bcm2708"; TARGET_SYSTEM="bcm27xx/bcm2708"
                ARCH_1="armv6"; ARCH_2="arm"; ARCH_3="arm_arm1176jzf-s_vfp"
                ;;
              "Raspberry Pi 2B")
                TARGET_NAME="bcm27xx-bcm2709"; TARGET_SYSTEM="bcm27xx/bcm2709"
                ARCH_1="armv7"; ARCH_2="arm"; ARCH_3="arm_cortex-a7_neon-vfpv4"
                ;;
              "Raspberry Pi 3B")
                TARGET_NAME="bcm27xx-bcm2710"; TARGET_SYSTEM="bcm27xx/bcm2710"
                ARCH_1="arm64"; ARCH_2="aarch64"; ARCH_3="aarch64_cortex-a53"
                ;;
              "Raspberry Pi 4B")
                TARGET_NAME="bcm27xx-bcm2711"; TARGET_SYSTEM="bcm27xx/bcm2711"
                ARCH_1="arm64"; ARCH_2="aarch64"; ARCH_3="aarch64_cortex-a72"
                ;;
              "Raspberry Pi 5B")
                TARGET_NAME="bcm27xx-bcm2712"; TARGET_SYSTEM="bcm27xx/bcm2712"
                ARCH_1="arm64"; ARCH_2="aarch64"; ARCH_3="aarch64_cortex-a76"
                ;;
              "X86-64")
                TARGET_NAME="x86-64"; TARGET_SYSTEM="x86/64"
                ARCH_1="amd64"; ARCH_2="x86_64"; ARCH_3="x86_64"
                ;;
              "X86-Generic")
                TARGET_NAME="x86-generic"; TARGET_SYSTEM="x86/generic"
                ARCH_1="386"; ARCH_2="i386"; ARCH_3="i386_pentium4"
                ;;
            esac
            
            case "$MATRIXTARGET" in
              "Nanopi-r2c") PROFILE="friendlyarm_nanopi-r2c" ;;
              "Nanopi-r2c Plus") PROFILE="friendlyarm_nanopi-r2c-plus" ;;
              "Nanopi-r2s") PROFILE="friendlyarm_nanopi-r2s" ;;
              "Nanopi-r3s") PROFILE="friendlyarm_nanopi-r3s" ;;
              "Nanopi-r4s") PROFILE="friendlyarm_nanopi-r4s" ;;
              "Nanopi-r5s") PROFILE="friendlyarm_nanopi-r5s" ;;
              "Widora Mangopi M28C") PROFILE="widora_mangopi-m28c" ;;
              "Widora Mangopi M28K") PROFILE="widora_mangopi-m28k" ;;
              "Orangepi Pc 2") PROFILE="xunlong_orangepi-pc2" ;;
              "Orangepi R1 Plus") PROFILE="xunlong_orangepi-r1-plus" ;;
              "Orangepi R1 Plus LTS") PROFILE="xunlong_orangepi-r1-plus-lts" ;;
              "Raspberry Pi 1B") PROFILE="rpi" ;;
              "Raspberry Pi 2B") PROFILE="rpi-2" ;;
              "Raspberry Pi 3B") PROFILE="rpi-3" ;;
              "Raspberry Pi 4B") PROFILE="rpi-4" ;;
              "Raspberry Pi 5B") PROFILE="rpi-5" ;;
              "X86-64" | "X86-Generic") PROFILE="generic" ;;
            esac
          else
            TARGET_NAME="armsr-armv8"; TARGET_SYSTEM="armsr/armv8"
            ARCH_1="arm64"; ARCH_2="aarch64"; ARCH_3="aarch64_generic"
            PROFILE="generic"
            
            case "$MATRIXTARGET" in
              "Allwinner H5 Orangepi Zero Plus") KERNEL="6.6.6-AW64-DBAI"; TARGET_BUILD="h5-orangepi-zeroplus" ;;
              "Allwinner H5 Orangepi Zero Plus2") KERNEL="6.6.6-AW64-DBAI"; TARGET_BUILD="h5-orangepi-zeroplus2" ;;
              "Allwinner H6 Orangepi 3") KERNEL="6.1.31-AW64-DBAI"; TARGET_BUILD="h6-orangepi-3" ;;
              "Allwinner H6 Orangepi 3 LTS") KERNEL="6.1.31-AW64-DBAI"; TARGET_BUILD="h6-orangepi-3lts" ;;
              "Allwinner H616 Orangepi Zero2") KERNEL="6.1.31-AW64-DBAI"; TARGET_BUILD="h616-orangepi-zero2" ;;
              "Allwinner H618 Orangepi Zero3") KERNEL="6.1.31-AW64-DBAI"; TARGET_BUILD="h618-orangepi-zero3" ;;
              "Orangepi 3B") KERNEL="5.10.160-rk35v-dbai"; TARGET_BUILD="rk3566-orangepi-3b" ;;
              "Amlogic B860Hv5 - 6.1.66") KERNEL="6.1.66-DBAI"; TARGET_BUILD="s905x2-b860hv5" ;;
              "Amlogic B860Hv5 - 6.4.11") KERNEL="6.4.11"; TARGET_BUILD="s905x2-b860hv5" ;;
              "Amlogic B860Hv5 - 6.2.2") KERNEL="6.2.2"; TARGET_BUILD="s905x2-b860hv5" ;;
              "Amlogic HG680-FJ - 6.1.66") KERNEL="6.1.66-DBAI"; TARGET_BUILD="s905x2-hg680-fj" ;;
              "Amlogic HG680-FJ - 6.4.11") KERNEL="6.4.11"; TARGET_BUILD="s905x2-hg680-fj" ;;
              "Amlogic HG680-FJ - 6.2.2") KERNEL="6.2.2"; TARGET_BUILD="s905x2-hg680-fj" ;;
              "Amlogic s905x4 - 6.1.66") KERNEL="6.1.66-DBAI"; TARGET_BUILD="s905x4" ;;
              "Amlogic s905x4 - 5.4.279") KERNEL="5.4.279"; TARGET_BUILD="s905x4" ;;
              "Amlogic s905x4 - 6.6.6") KERNEL="6.6.6"; TARGET_BUILD="s905x4" ;;
              "Amlogic s905x4 - 5.4.265") KERNEL="5.4.265"; TARGET_BUILD="s905x4" ;;
              "Amlogic s905 MXQ-Pro+") KERNEL="5.15.y_6.1.y"; TARGET_BUILD="s905-mxqpro-plus" ;;
              "Amlogic s905 Beelink-Mini") KERNEL="5.15.y_6.1.y"; TARGET_BUILD="s905-beelink-mini" ;;
              "Amlogic s905lb Q96-Mini") KERNEL="5.15.y_6.1.y"; TARGET_BUILD="s905lb-q96-mini" ;;
              "Amlogic s905w TX3-Mini") KERNEL="5.15.y_6.1.y"; TARGET_BUILD="s905w" ;;
              "Amlogic s905w X96-Mini") KERNEL="5.15.y_6.1.y"; TARGET_BUILD="s905w-x96-mini" ;;
              "Amlogic s905w X96W") KERNEL="5.15.y_6.1.y"; TARGET_BUILD="s905w-x96w" ;;
              "Amlogic s905x B860H" | "Amlogic s905x B860H MODSDCARD") KERNEL="5.15.y_6.1.y_6.6.y"; TARGET_BUILD="s905x-b860h" ;;
              "Amlogic s905x HG680P" | "Amlogic s905x HG680P MODSDCARD") KERNEL="5.15.y_6.1.y_6.6.y"; TARGET_BUILD="s905x" ;;
              "Amlogic s905x2 B860Hv5") KERNEL="6.1.y"; TARGET_BUILD="s905x2-b860h-v5" ;;
              "Amlogic s905x2 B860Hv5-x") KERNEL="6.2.y_6.3.y_6.4.y"; TARGET_BUILD="s905x2-b860h-v5" ;;
              "Amlogic s905x2 HG680-FJ") KERNEL="5.15.y_6.1.y"; TARGET_BUILD="s905x2-hg680-fj" ;;
              "Amlogic s905x2 HG680-FJ-x") KERNEL="6.2.y_6.4.y"; TARGET_BUILD="s905x2-hg680-fj" ;;
              "Amlogic s905x2 X96Max-v2Gb") KERNEL="5.15.y_6.1.y"; TARGET_BUILD="s905x2-x96max-2g" ;;
              "Amlogic s905x2 X96Max-v4Gb") KERNEL="5.15.y_6.1.y"; TARGET_BUILD="s905x2" ;;
              "Amlogic s905x3 HK1-Vontar-X3") KERNEL="5.15.y_6.1.y"; TARGET_BUILD="s905x3-hk1" ;;
              "Amlogic s905x3 X96Air_100mb") KERNEL="5.15.y_6.1.y"; TARGET_BUILD="s905x3-x96air" ;;
              "Amlogic s905x3 X96Air_1Gb") KERNEL="5.15.y_6.1.y"; TARGET_BUILD="s905x3-x96air-gb" ;;
              "Amlogic s905x3 X96Max+_100Mb") KERNEL="5.15.y_6.1.y"; TARGET_BUILD="s905x3" ;;
              "Amlogic s905x3 X96Max+_1Gb") KERNEL="5.15.y_6.1.y"; TARGET_BUILD="s905x3-x96max" ;;
              "Amlogic s905x3 H96-Max-X3") KERNEL="5.15.y_6.1.y"; TARGET_BUILD="s905x3-h96max" ;;
              "Amlogic s905x4 Advan-At01_Ax810") KERNEL="6.1.y_6.6.y"; TARGET_BUILD="s905x4-advan" ;;
              "Amlogic s912 Nexbox-A1-A95X") KERNEL="5.15.y_6.1.y"; TARGET_BUILD="s912-nexbox-a1" ;;
              "Amlogic s912 Nexbox-A95X-A2") KERNEL="5.15.y_6.1.y"; TARGET_BUILD="s912-nexbox-a2" ;;
              "Amlogic s922x GT-King-Pro") KERNEL="5.15.y_6.1.y"; TARGET_BUILD="s922x" ;;
              "Tanix-TX6") KERNEL="6.1.y"; TARGET_BUILD="tanix-tx6" ;;
              "Rk3318-BOX") KERNEL="5.15.y_6.1.y"; TARGET_BUILD="rk3318-box" ;;
              "Firefly-Rk3328") KERNEL="5.15.y_6.1.y"; TARGET_BUILD="renegade-rk3328" ;;
              "Rk3399 King3399") KERNEL="6.1.y"; TARGET_BUILD="king3399" ;;
              "Orangepi 5 Plus") KERNEL="6.1.y"; TARGET_BUILD="orangepi-5-plus" ;;
              "Orangepi 5B") KERNEL="6.1.y"; TARGET_BUILD="orangepi-5b" ;;
              "H96-Max-M2") KERNEL="6.1.y"; TARGET_BUILD="h96-max-m2" ;;
              "Nanopi-M5") KERNEL="6.12.y"; TARGET_BUILD="nanopi-m5" ;;
            esac
            
            echo "TYPE=$(echo "$BUILDER_TYPE" | tr 'a-z' 'A-Z')" >> $GITHUB_ENV
          fi

          echo "BUILDER_TYPE=$BUILDER_TYPE" >> $GITHUB_ENV
          echo "TARGET_NAME=$TARGET_NAME" >> $GITHUB_ENV
          echo "TARGET_SYSTEM=$TARGET_SYSTEM" >> $GITHUB_ENV
          echo "PROFILE=$PROFILE" >> $GITHUB_ENV
          echo "ARCH_1=$ARCH_1" >> $GITHUB_ENV
          echo "ARCH_2=$ARCH_2" >> $GITHUB_ENV
          echo "ARCH_3=$ARCH_3" >> $GITHUB_ENV
          echo "KERNEL=$KERNEL" >> $GITHUB_ENV
          echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Fetch Image Builder Framework
        id: download
        if: steps.variables.outputs.status == 'success'
        run: |
          CURVER=$(echo "${BRANCH}" | cut -d'.' -f1)
          archive_ext=$([ "${CURVER}" -ge "24" ] && echo "tar.zst" || echo "tar.xz")
          FILENAME="${BASE}-imagebuilder-${BRANCH}-${TARGET_NAME}.Linux-x86_64.${archive_ext}"
          PRIMARY_URL="${DOWNLOAD_BASE}/releases/${BRANCH}/targets/${TARGET_SYSTEM}/${FILENAME}"
          FALLBACK_URL=$([ "${BASE}" == "immortalwrt" ] && echo "https://immortalwrt.kyarucloud.moe/releases/${BRANCH}/targets/${TARGET_SYSTEM}/${FILENAME}" || echo "")

          if wget --timeout=60 --tries=3 --progress=dot:giga "$PRIMARY_URL"; then
            download_success=true
          elif [ -n "$FALLBACK_URL" ] && wget --timeout=60 --tries=3 --progress=dot:giga "$FALLBACK_URL"; then
            download_success=true
          else
            exit 1
          fi

          case "${archive_ext}" in
            tar.xz) tar -xJf *-imagebuilder-* && rm -f *-imagebuilder-*.tar.xz ;;
            tar.zst) tar --use-compress-program=unzstd -xf *-imagebuilder-* && rm -f *-imagebuilder-*.tar.zst ;;
          esac

          mv *-imagebuilder-* ${WORKING_DIR}
          if [ -d "/builder" ]; then mv ${WORKING_DIR} /builder/; ln -s /builder/${WORKING_DIR} ${WORKING_DIR}; fi
          if [ -d "$GITHUB_WORKSPACE/origin/compile" ]; then cp -r $GITHUB_WORKSPACE/origin/compile/* $GITHUB_WORKSPACE/${WORKING_DIR}/; fi
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: System Permissions and Sanitize
        id: set-permission
        if: steps.download.outputs.status == 'success'
        run: |
          cd ${{ env.WORKING_DIR }}
          chmod +x ./build-tools.sh ./include.sh 2>/dev/null || true
          if [ -d "files/" ]; then find files/ -type f -exec dos2unix {} + 2>/dev/null || true; fi
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Setup External Packages
        id: packages
        if: steps.set-permission.outputs.status == 'success'
        run: |
          cd ${{ env.WORKING_DIR }}
          ./build-tools.sh packages
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Apply Core Patches and UI
        id: customize
        if: steps.packages.outputs.status == 'success'
        run: |
          cd ${{ env.WORKING_DIR }}
          ./build-tools.sh patch ${{ env.ROOTFS_SIZE }}
          ./build-tools.sh misc
          ./build-tools.sh tunnel ${{ env.TUNNEL }}
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Generate Firmware Images
        id: build
        if: steps.customize.outputs.status == 'success'
        run: |
          cd ${{ env.WORKING_DIR }}
          mkdir -p compiled_images
          if [ "${{ env.CLEAN }}" == "true" ]; then make clean; fi
          time ./build-tools.sh makeimage ${{ env.PROFILE }} ${{ env.TUNNEL }}

          if [ "${{ env.BUILDER_TYPE }}" == "official" ]; then
            for file in bin/targets/"${{ env.TARGET_SYSTEM }}"/*.img.*; do
              if [ -f "$file" ] && [ ! -L "$file" ]; then
                if [[ "$file" == *.img.zst ]]; then
                  zstd -d --rm "$file" && gzip "${file%.zst}"
                  file="${file%.zst}.gz"
                elif [[ "$file" == *.img.xz ]]; then
                  xz -d "$file" && gzip "${file%.xz}"
                  file="${file%.xz}.gz"
                fi
                mv "$file" compiled_images/
              fi
            done
          else
            for file in bin/targets/"${{ env.TARGET_SYSTEM }}"/*-rootfs.tar.*; do
              if [ -f "$file" ] && [ ! -L "$file" ]; then
                if [[ "$file" == *.tar.zst ]]; then
                  zstd -d --rm "$file" && gzip "${file%.zst}"
                  file="${file%.zst}.gz"
                elif [[ "$file" == *.tar.xz ]]; then
                  xz -d "$file" && gzip "${file%.xz}"
                  file="${file%.xz}.gz"
                fi
                mv "$file" compiled_images/"XIDZs_$(basename "$file" -rootfs.tar.gz)_${{ env.TUNNEL }}-rootfs.tar.gz"
                break
              fi
            done
          fi
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Repack Image Builder
        id: repack
        if: steps.build.outputs.status == 'success' && env.BUILDER_TYPE != 'official'
        run: |
          cd ${{ env.WORKING_DIR }}
          ./build-tools.sh repack --${{ env.BUILDER_TYPE }} -t "${{ env.TARGET_BUILD }}" -k "${{ env.KERNEL }}" -tn "${{ env.TUNNEL }}" -s "${{ env.ROOTFS_SIZE }}"
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Execute Mod SDCard
        id: modsdcard
        if: (steps.build.outputs.status == 'success' && env.BUILDER_TYPE != 'official') || steps.repack.outputs.status == 'success'
        run: |
          cd ${{ env.WORKING_DIR }}
          if [ -f "./modsdcard.sh" ]; then
            chmod +x ./modsdcard.sh
            ./modsdcard.sh
          fi
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Finalize Image Renaming
        id: beforeupload
        if: (steps.build.outputs.status == 'success' && env.BUILDER_TYPE == 'official') || steps.repack.outputs.status == 'success'
        run: |
          cd ${{ env.WORKING_DIR }}
          ./build-tools.sh rename
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Publish to Github Releases
        if: steps.beforeupload.outputs.status == 'success'
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          files: ${{ env.WORKING_DIR }}/compiled_images/*.img.gz
          prerelease: ${{ github.ref_name == 'dev' }}

      - name: System Teardown and Cleanup
        if: always()
        run: |
          cd ${{ env.WORKING_DIR }} || cd $GITHUB_WORKSPACE/${{ env.WORKING_DIR }}
          sudo rm -rf bin/ build_dir/ dl/ feeds/ files/ package/ packages/ staging_dir/ tmp/ .config .env logs/ /tmp/*
          sudo apt-get clean && sudo journalctl --vacuum-time=1h
          if [ -d "/builder" ]; then sudo rm -rf /builder/*; fi

      - name: Clean Simulated Disk
        if: always() && contains(inputs.target, 'all-devices')
        run: |
          sudo umount /builder || true
          sudo lvremove -f /dev/github/runner || true
          sudo vgremove -f github || true
          sudo pvremove -f /dev/loop6 /dev/loop7 || true
          sudo losetup -d /dev/loop6 /dev/loop7 || true
          sudo rm -f /mnt/mnt.img /root.img || true
          sudo rmdir /builder || true
