port: 7890
redir-port: 7891
socks-port: 7892
mixed-port: 7893
tproxy-port: 7894

allow-lan: true
bind-address: '*'
routing-mark: 0x100
mode: rule
log-level: silent
ipv6: false
external-controller: 0.0.0.0:9090
external-ui: ui
secret: anu
geodata-mode: true
geodata-loader: memconservative
global-client-fingerprint: chrome
keep-alive-interval: 15
tcp-concurrent: true
unified-delay: true
tun:
  enable: false
  stack: gvisor
  device: Meta
  dns-hijack:
    - any:53
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
  skip-domain:
    - '+.microsoft.com'
    - '+.windows.com'
dns:
  enable: true
  ipv6: false
  enhanced-mode: redir-host
  listen: 0.0.0.0:1053
  default-nameserver:
    - 8.8.8.8
    - 8.8.4.4
  fallback:
    - 1.0.0.1
    - 8.8.4.4
    - 149.112.112.112
  nameserver:
    - 1.1.1.1
    - 8.8.8.8
    - 9.9.9.9
  proxy-server-nameserver:
    - 112.215.203.246
    - 112.215.203.247
    - 112.215.203.248
    - 112.215.203.254
    - 112.215.198.248
    - 112.215.198.254
profile:
  store-selected: true
  store-fake-ip: false
proxy-providers:
  MIX:
    type: file
    path: ./proxy_providers/mix.yaml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 120
proxy-groups:
- name: AUTO-MIX
  type: fallback
  disable-udp: false
  use:
  - MIX
  url: http://www.gstatic.com/generate_204
  interval: 120
- name: SERVER-UMUM
  type: select
  disable-udp: false
  proxies:
  - AUTO-MIX
  - DIRECT
- name: SERVER-GAME
  type: select
  disable-udp: false
  proxies:
  - SERVER-UMUM
  - DIRECT
- name: FB-IG-LINE
  type: select
  disable-udp: false
  proxies:
  - DIRECT
  - SERVER-UMUM
- name: WHATSAPP
  type: select
  disable-udp: false
  proxies:
  - DIRECT
  - SERVER-UMUM
- name: YOUTUBE
  type: select
  disable-udp: false
  proxies:
  - DIRECT
  - SERVER-UMUM
- name: NETFLIX
  type: select
  disable-udp: false
  proxies:
  - DIRECT
  - SERVER-UMUM
- name: TIKTOK
  type: select
  disable-udp: false
  proxies:
  - DIRECT
  - SERVER-UMUM
rule-providers:
  bankid:
    type: file
    behavior: domain
    path: ./rule_providers/bankid.yaml
  game:
    type: file
    behavior: classical
    path: ./rule_providers/game.yaml
  portgame:
    type: file
    behavior: classical
    path: ./rule_providers/portgame.yaml
  umum:
    type: file
    behavior: classical
    path: ./rule_providers/umum.yaml
  whatsapp:
    type: file
    behavior: classical
    path: ./rule_providers/whatsapp.yaml
  youtube:
    type: file
    behavior: classical
    path: ./rule_providers/youtube.yaml
  fb:
    type: file
    behavior: classical
    path: ./rule_providers/fb.yaml
  meta:
    type: file
    behavior: classical
    path: ./rule_providers/meta.yaml
  ig:
    type: file
    behavior: classical
    path: ./rule_providers/ig.yaml
  line:
    type: file
    behavior: classical
    path: ./rule_providers/line.yaml
  netflix:
    type: file
    behavior: classical
    path: ./rule_providers/netflix.yaml
  tiktok:
    type: file
    behavior: classical
    path: ./rule_providers/tiktok.yaml
rules:
- RULE-SET,whatsapp,WHATSAPP
- RULE-SET,line,FB-IG-LINE
- RULE-SET,fb,FB-IG-LINE
- RULE-SET,meta,FB-IG-LINE
- RULE-SET,ig,FB-IG-LINE
- RULE-SET,youtube,YOUTUBE
- RULE-SET,netflix,NETFLIX
- RULE-SET,tiktok,TIKTOK
- RULE-SET,umum,SERVER-UMUM
- RULE-SET,game,SERVER-GAME
- RULE-SET,portgame,SERVER-GAME
- RULE-SET,bankid,SERVER-UMUM
- MATCH,SERVER-UMUM