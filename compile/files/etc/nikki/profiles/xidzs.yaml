proxy-providers:
  MIX:
    type: file
    path: ./providers/proxy/mix.yaml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 120
proxy-groups:
- name: AUTO-MIX
  type: fallback
  disable-udp: false
  use:
  - MIX
  url: http://www.gstatic.com/generate_204
  interval: 120
- name: SELECT
  type: select
  disable-udp: false
  use:
  - MIX
- name: SERVER-UMUM
  type: select
  disable-udp: false
  proxies:
  - AUTO-MIX
  - SELECT
  - DIRECT
- name: SERVER-GAME
  type: select
  disable-udp: false
  proxies:
  - AUTO-MIX
  - SELECT
  - DIRECT
rule-providers:
  Game:
    type: file
    behavior: classical
    path: ./providers/rule/game.yaml
  PortGame:
    type: file
    behavior: classical
    path: ./providers/rule/portgame.yaml
  Umum:
    type: file
    behavior: classical
    path: ./providers/rule/umum.yaml
  indo:
    type: file
    behavior: classical
    path: ./providers/rule/indo.yaml
  Sosmed:
    type: file
    behavior: classical
    path: ./providers/rule/sosmed.yaml
  Streaming:
    type: file
    behavior: classical
    path: ./providers/rule/streaming.yaml
  Bankid:
    type: file
    behavior: domain
    path: ./providers/rule/bankid.yaml
  Tiktok:
    type: file
    behavior: domain
    path: ./providers/rule/tiktok.yaml
  Meta:
    type: file
    behavior: domain
    path: ./providers/rule/meta.yaml
rules:
- RULE-SET,Umum,SERVER-UMUM
- RULE-SET,Game,SERVER-GAME
- RULE-SET,PortGame,SERVER-GAME
- RULE-SET,indo,SERVER-UMUM
- RULE-SET,Sosmed,SERVER-UMUM
- RULE-SET,Streaming,SERVER-UMUM
- RULE-SET,Bankid,SERVER-UMUM
- RULE-SET,Tiktok,SERVER-UMUM
- RULE-SET,Meta,SERVER-UMUM
- MATCH,SERVER-UMUM
dns:
  enable: true
  ipv6: true
  default-nameserver:
    - 8.8.8.8
    - 8.8.4.4
  fallback:
    - 1.0.0.1
    - 8.8.4.4
    - 149.112.112.112
  nameserver:
    - 1.1.1.1
    - 8.8.8.8
    - 9.9.9.9
  proxy-server-nameserver:
    - 112.215.203.246
    - 112.215.203.247
    - 112.215.203.248
    - 112.215.203.254
    - 112.215.198.248
    - 112.215.198.254